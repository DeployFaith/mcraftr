services:
  mcraftr:
    image: ${MCRAFTR_IMAGE}
    restart: unless-stopped
    ports:
      - ${MCRAFTR_BIND_HOST:-127.0.0.1}:${MCRAFTR_BIND_PORT:-3054}:3050
    env_file: .env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@mcraftr-redis:6379
      PORT: 3050
      HOSTNAME: 0.0.0.0
    volumes:
      - ./data:/app/data
    depends_on:
      - mcraftr-redis

  mcraftr-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --requirepass ${REDIS_PASSWORD}
